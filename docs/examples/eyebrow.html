<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aptus Eyebrow CSS</title>
  <link rel="stylesheet" href="../../src/eyebrow.css">
  <style>
    :root {
      --font-size-small: 0.875rem;
      --font-weight-bold: 700;
      --accent-color: #b45309;
    }

    body {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 20px 56px;
      color: #242424;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
      background: #f0f0f0;
    }

    h1 {
      margin: 0 0 24px;
      line-height: 1.2;
    }

    h2 {
      margin: 0;
      line-height: 1.2;
    }

    pre {
      overflow-x: auto;
      margin: 14px 0 0;
      padding: 12px;
      background: #f6f6f6;
      border: 1px solid #dddddd;
    }

    code {
      font-family: Consolas, Monaco, monospace;
      font-size: 0.94rem;
    }

    .doc-example {
      margin: 14px 0;
      padding: 16px;
      border: 1px solid #dddddd;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Aptus Eyebrow CSS</h1>

    <div class="doc-example">
      <div class="eyebrow">
        <span class="eyebrow-mark" aria-hidden="true"></span>
        Featured guide
      </div>
      <h2>Build a clear visual hierarchy</h2>
    </div>

    <pre><code>&lt;div class="eyebrow"&gt;
  &lt;span class="eyebrow-mark" aria-hidden="true"&gt;&lt;/span&gt;
  Featured guide
&lt;/div&gt;</code></pre>
  </main>
</body>
</html>
